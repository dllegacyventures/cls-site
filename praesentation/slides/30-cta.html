<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>P28 · CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 156px;
    gap: 64px;
  }
  h1 { font-size: 158px; max-width: 1660px; }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 26px;
    border: 2px solid var(--red);
    background: rgba(255, 159, 28, 0.08);
    padding: 34px 56px;
    font-family: var(--display);
    font-size: 44px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .cta .arr { color: var(--red); }
  .last {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--faint);
  }
</style>
</head>
<body>
  <div class="stage">
    <h1 class="h-display">Eine Webseite kann dein Leben verändern. <span class="red">Mehrere machen dich frei.</span></h1>
    <div class="cta"><span class="arr">→</span> Zugang zur CLS Community sichern</div>
    <p class="last">Lass uns bauen. — Mario</p>
  </div>
</body>
</html>
