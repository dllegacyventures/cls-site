<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>P01 · Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 140px;
  }
  .title {
    font-size: 460px;
    margin: 40px 0 30px -14px;
  }
  .title .dot { color: var(--red); }
  .sub {
    font-size: 40px;
    letter-spacing: 0.02em;
    color: var(--muted);
    font-weight: 500;
  }
  .sub b { color: var(--ink); }
  .sub .red { color: var(--red); }
  .meta {
    position: absolute;
    bottom: 64px;
    left: 140px;
    right: 140px;
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--faint);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="kicker">Das Claude Lösungs System</div>
    <h1 class="h-display title">CLS<span class="dot">.</span></h1>
    <p class="sub">KI baut. Du verkaufst. <b>Beide kassieren<span class="red">.</span></b></p>
  </div>
  <div class="meta">
    <span>Mario · VSL</span>
    <span>2026</span>
  </div>
</body>
</html>
