<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>P09 · Jarvis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background-color: var(--bg); }
  .stage {
    position: absolute;
    inset: 88px 96px 76px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 54px;
    padding-left: 60px;
  }
  h1 {
    font-size: 340px;
    margin-left: -10px;
  }
  .sub {
    font-size: 33px;
    line-height: 1.6;
    color: var(--muted);
    max-width: 1280px;
  }
  .sub b { color: var(--ink); }
  .status {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--faint);
    border: 1px solid var(--line);
    padding: 20px 30px;
    display: inline-block;
    width: fit-content;
  }
  .status .ok { color: var(--red); }
  .swarm-holder.hero {
    top: 230px;
    right: 260px;
    --swx: 160px;
    --swy: 55px;
    animation-duration: 14s;
  }
</style>
</head>
<body class="board">
  <div class="chrome-top"><span class="brand">CLS <b>—</b> Claude Lösungs System</span><span>Das System</span></div>
  <div class="stage">
    <h1 class="h-display">Jarvis<span class="red">.</span></h1>
    <p class="sub"><b>Mein KI-Clon auf Claude-Basis.</b> Er findet Leads, schreibt Outreach, baut Webseiten — er arbeitet, wie ich arbeiten würde. Nur schneller, und rund um die Uhr.</p>
    <div class="status"><span class="ok">●</span>&nbsp; jarvis online — wartet auf sein nächstes Briefing</div>
  </div>
  <div class="swarm-holder hero"><canvas class="jarvis-swarm" width="760" height="760" data-particles="110" style="width:380px;height:380px"></canvas></div>
  <div class="chrome-bottom"><span>VSL — CLS</span><span class="num"><b>10</b> / 30</span></div>
  <script src="../shared/jarvis-swarm.js"></script>
</body>
</html>
